<!DOCTYPE html>
<html>
<head>
    <title>Classic Tetris JS</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background-color: #000;
        }
        #ui {
            position: absolute;
            top: 0;
            right: -150px;
            text-align: left;
            width: 140px;
        }
        .stat-label { font-size: 14px; color: #aaa; }
        .stat-value { font-size: 24px; margin-bottom: 20px; color: #fff; }
        h1 { margin-top: 0; color: #f0f0f0; }
        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 20;
        }
        .overlay.show {
            display: flex;
        }
        .game-over-card {
            width: min(92vw, 420px);
            background: #191919;
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        .game-over-card h2 {
            margin: 0 0 8px;
            color: #ffd700;
        }
        .game-over-card p {
            margin: 10px 0;
        }
        .name-input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #0f0f0f;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .actions button {
            flex: 1;
            padding: 10px 12px;
            border: 0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .save-btn {
            background: #ffd700;
            color: #111;
        }
        .restart-btn {
            background: #2c8cff;
            color: #fff;
        }
        .secondary-action {
            width: 100%;
            margin-top: 10px;
            padding: 10px 12px;
            border: 0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            background: #3a3a3a;
            color: #fff;
        }
        .save-status {
            min-height: 20px;
            margin-top: 8px;
            color: #8ddf8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="ui">
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
            <div class="stat-label">LINES</div>
            <div id="lines" class="stat-value">0</div>
        </div>
    </div>

    <div id="game-over-overlay" class="overlay" aria-hidden="true">
        <div class="game-over-card" role="dialog" aria-labelledby="game-over-title">
            <h2 id="game-over-title">Game Over</h2>
            <p>Final Score: <strong id="final-score">0</strong></p>
            <input id="player-name" class="name-input" type="text" maxlength="40" placeholder="Enter your name" />
            <div class="actions">
                <button id="save-score-btn" class="save-btn" type="button">Save Score</button>
                <button id="restart-btn" class="restart-btn" type="button">Play Again</button>
            </div>
            <button id="return-games-btn" class="secondary-action" type="button">Return to Games</button>
            <p id="save-status" class="save-status"></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');
        const overlay = document.getElementById('game-over-overlay');
        const finalScoreElement = document.getElementById('final-score');
        const playerNameInput = document.getElementById('player-name');
        const saveScoreButton = document.getElementById('save-score-btn');
        const restartButton = document.getElementById('restart-btn');
        const returnGamesButton = document.getElementById('return-games-btn');
        const saveStatus = document.getElementById('save-status');

        let isGameOver = false;
        let hasSavedScore = false;
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:3000'
            : 'https://server-x77u.onrender.com';

        async function saveScore(playerName, finalScore) {
            try {
                const response = await fetch(`${API_BASE}/api/scores`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        player_name: playerName,
                        game_name: 'Tetris',
                        score: finalScore
                    })
                });
                return response.ok;
            } catch (_err) {
                return false;
            }
        }

        function openGameOverPanel() {
            finalScoreElement.textContent = String(player.score);
            const storedName = localStorage.getItem('arcade_player_name') || '';
            playerNameInput.value = storedName;
            saveStatus.textContent = '';
            saveScoreButton.disabled = false;
            overlay.classList.add('show');
            overlay.setAttribute('aria-hidden', 'false');
            setTimeout(() => playerNameInput.focus(), 0);
        }

        async function handleSaveScore() {
            if (hasSavedScore) {
                saveStatus.textContent = 'Score already saved.';
                return;
            }

            const playerName = (playerNameInput.value || 'Guest').trim() || 'Guest';
            localStorage.setItem('arcade_player_name', playerName);

            saveScoreButton.disabled = true;
            saveStatus.textContent = 'Saving...';

            const ok = await saveScore(playerName, player.score);
            if (ok) {
                hasSavedScore = true;
                saveStatus.textContent = `Saved for ${playerName}!`;
                return;
            }

            saveStatus.textContent = 'Could not save score. Try again.';
            saveScoreButton.disabled = false;
        }

        function endGame() {
            if (isGameOver) return;
            isGameOver = true;
            openGameOverPanel();
        }

        context.scale(20, 20); // Scale up the drawing so 1 unit = 20px

        // 1. Define the 7 classic Tetromino shapes
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        // Colors for the pieces
        const colors = [
            null,
            '#FF0D72', // I
            '#0DC2FF', // L
            '#0DFF72', // J
            '#F538FF', // O
            '#FF8E0D', // Z
            '#FFE138', // S
            '#3877FF', // T
        ];

        // Create the game board (arena)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        const arena = createMatrix(12, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            lines: 0,
        };

        // Collision Detection
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Merge piece into arena
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // Rotate piece (Transpose + Reverse)
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // Clear full lines
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
            updateScore();
        }

        // Draw a matrix
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // Draw a small border for the block
                        context.strokeStyle = '#000';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                endGame();
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            linesElement.innerText = player.lines;
        }

        let dropCounter = 0;
        let dropInterval = 1000;

        let lastTime = 0;
        function update(time = 0) {
            if (isGameOver) {
                return;
            }

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        saveScoreButton.addEventListener('click', handleSaveScore);
        restartButton.addEventListener('click', () => {
            window.location.reload();
        });
        returnGamesButton.addEventListener('click', () => {
            window.location.href = '/play';
        });
        playerNameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') handleSaveScore();
        });

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) { // Left
                playerMove(-1);
            } else if (event.keyCode === 39) { // Right
                playerMove(1);
            } else if (event.keyCode === 40) { // Down
                playerDrop();
            } else if (event.keyCode === 81) { // Q key
                playerRotate(-1);
            } else if (event.keyCode === 87 || event.keyCode === 38) { // W or Up key
                playerRotate(1);
            }
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
