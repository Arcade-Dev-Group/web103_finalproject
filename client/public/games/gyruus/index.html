<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYRUSS - JS Clone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: white;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-text {
            text-shadow: 2px 2px 0px #000;
            font-size: 16px;
            color: #0ff;
        }

        #screens {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            pointer-events: auto;
            z-index: 10;
        }

        .screen-content {
            text-align: center;
            display: none;
        }

        .screen-content.active {
            display: block;
        }

        h1 {
            font-size: 40px;
            color: #ff00de;
            text-shadow: 4px 4px 0px #00ffff;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        button {
            background: #00ffff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
            box-shadow: 0 0 15px #00ffff;
        }

        button:hover {
            transform: scale(1.1);
            background: #fff;
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 30px;
            font-size: 10px;
            color: #aaa;
            line-height: 1.6;
        }
        
        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 30;
        }
        .overlay.show {
            display: flex;
        }
        .game-over-card {
            width: min(92vw, 420px);
            background: #191919;
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        .game-over-card h2 {
            margin: 0 0 8px;
            color: #00ffff;
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
        }
        .game-over-card p {
            margin: 10px 0;
            font-family: Arial, sans-serif;
        }
        .name-input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #0f0f0f;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .actions button {
            flex: 1;
            padding: 10px 12px;
            border: 0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        .secondary-action {
            width: 100%;
            margin-top: 10px;
            padding: 10px 12px;
            border: 0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            background: #3a3a3a;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        .save-btn {
            background: #00ffff;
            color: #111;
        }
        .restart-btn {
            background: #2c8cff;
            color: #fff;
        }
        .save-status {
            min-height: 20px;
            margin-top: 8px;
            color: #8ddf8d;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui-layer">
            <div class="hud-text">SCORE: <span id="scoreEl">0</span></div>
            <div class="hud-text" style="text-align: right;">HIGH: <span id="highScoreEl">0</span></div>
        </div>

        <div id="screens">
            <!-- Start Screen -->
            <div id="start-screen" class="screen-content active">
                <h1>GYRUSS</h1>
                <button id="startBtn">INSERT COIN</button>
                <div class="controls-hint">
                    ARROWS: Move & Rotate<br>
                    SPACE: Fire
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen-content">
                <h1 style="color: #ff3333; text-shadow: 4px 4px 0 #550000;">GAME OVER</h1>
                <p class="hud-text">FINAL SCORE: <span id="finalScore">0</span></p>
                <br>
                <button id="restartBtn">TRY AGAIN</button>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay" aria-hidden="true">
            <div class="game-over-card" role="dialog" aria-labelledby="game-over-title">
                <h2 id="game-over-title">Game Over</h2>
                <p>Final Score: <strong id="final-score">0</strong></p>
                <input id="player-name" class="name-input" type="text" maxlength="40" placeholder="Enter your name" />
                <div class="actions">
                    <button id="save-score-btn" class="save-btn" type="button">Save Score</button>
                    <button id="modal-restart-btn" class="restart-btn" type="button">Play Again</button>
                </div>
                <button id="return-games-btn" class="secondary-action" type="button">Return to Games</button>
                <p id="save-status" class="save-status"></p>
            </div>
        </div>
    </div>

<script>
/**
 * GYRUSS CLONE
 * Single file implementation
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreEl');
const highScoreEl = document.getElementById('highScoreEl');
const finalScoreEl = document.getElementById('finalScore');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const overlay = document.getElementById('game-over-overlay');
const finalScoreElement = document.getElementById('final-score');
const playerNameInput = document.getElementById('player-name');
const saveScoreButton = document.getElementById('save-score-btn');
const modalRestartBtn = document.getElementById('modal-restart-btn');
const returnGamesButton = document.getElementById('return-games-btn');
const saveStatus = document.getElementById('save-status');
const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost:3000'
    : 'https://server-x77u.onrender.com';

// Game State
let gameRunning = false;
let score = 0;
let highScore = localStorage.getItem('gyruss_highscore') || 0;
highScoreEl.innerText = highScore;
let frameCount = 0;
let hasSavedScore = false;

// Audio Context (Synthesizer)
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

async function saveScore(playerName, finalScore) {
    try {
        const response = await fetch(`${API_BASE}/api/scores`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                player_name: playerName,
                game_name: 'Gyruss',
                score: finalScore
            })
        });
        return response.ok;
    } catch (_err) {
        return false;
    }
}

function openGameOverPanel() {
    finalScoreElement.textContent = String(score);
    const storedName = localStorage.getItem('arcade_player_name') || '';
    playerNameInput.value = storedName;
    saveStatus.textContent = '';
    saveScoreButton.disabled = false;
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden', 'false');
    setTimeout(() => playerNameInput.focus(), 0);
}

async function handleSaveScore() {
    if (hasSavedScore) {
        saveStatus.textContent = 'Score already saved.';
        return;
    }

    const playerName = (playerNameInput.value || 'Guest').trim() || 'Guest';
    localStorage.setItem('arcade_player_name', playerName);

    saveScoreButton.disabled = true;
    saveStatus.textContent = 'Saving...';

    const ok = await saveScore(playerName, score);
    if (ok) {
        hasSavedScore = true;
        saveStatus.textContent = `Saved for ${playerName}!`;
        return;
    }

    saveStatus.textContent = 'Could not save score. Try again.';
    saveScoreButton.disabled = false;
}

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    
    if (type === 'shoot') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'explosion') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
    } else if (type === 'hit') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.2);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
    }
}

// Input Handling
const keys = {
    ArrowUp: false,
    ArrowDown: false,
    ArrowLeft: false,
    ArrowRight: false,
    Space: false
};

window.addEventListener('keydown', (e) => {
    if(e.code === 'Space') keys.Space = true;
    if(e.code === 'ArrowUp') keys.ArrowUp = true;
    if(e.code === 'ArrowDown') keys.ArrowDown = true;
    if(e.code === 'ArrowLeft') keys.ArrowLeft = true;
    if(e.code === 'ArrowRight') keys.ArrowRight = true;
});

window.addEventListener('keyup', (e) => {
    if(e.code === 'Space') keys.Space = false;
    if(e.code === 'ArrowUp') keys.ArrowUp = false;
    if(e.code === 'ArrowDown') keys.ArrowDown = false;
    if(e.code === 'ArrowLeft') keys.ArrowLeft = false;
    if(e.code === 'ArrowRight') keys.ArrowRight = false;
});

// Game Objects
let player = {
    angle: -Math.PI / 2, // Start at top
    radius: 200,
    size: 15,
    color: '#00ffff',
    lastShot: 0
};

let bullets = [];
let enemies = [];
let particles = [];
let stars = [];

// Initialize Stars
for(let i=0; i<100; i++) {
    stars.push({
        angle: Math.random() * Math.PI * 2,
        radius: Math.random() * 400,
        speed: Math.random() * 2 + 0.5,
        size: Math.random() * 2
    });
}

// --- Logic Functions ---

function spawnEnemy() {
    const types = [
        { color: '#ff0055', speed: 1.5, score: 100, size: 10 }, // Fast Red
        { color: '#ffff00', speed: 0.8, score: 200, size: 15 }, // Slow Yellow
        { color: '#00ff00', speed: 1.0, score: 150, size: 12 }  // Green
    ];
    const type = types[Math.floor(Math.random() * types.length)];
    
    enemies.push({
        angle: Math.random() * Math.PI * 2,
        radius: 400, // Spawn at edge
        speed: type.speed,
        color: type.color,
        score: type.score,
        size: type.size,
        spiral: Math.random() > 0.5 ? 0.02 : -0.02 // Spiral direction
    });
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 1.0,
            color: color
        });
    }
}

function update() {
    if (!gameRunning) return;

    // Player Movement
    if (keys.ArrowLeft) player.angle -= 0.05;
    if (keys.ArrowRight) player.angle += 0.05;
    
    // Move In/Out
    if (keys.ArrowUp) player.radius = Math.max(50, player.radius - 2);
    if (keys.ArrowDown) player.radius = Math.min(350, player.radius + 2);

    // Shooting
    if (keys.Space && Date.now() - player.lastShot > 200) {
        bullets.push({
            angle: player.angle,
            radius: player.radius,
            speed: 8
        });
        playSound('shoot');
        player.lastShot = Date.now();
    }

    // Update Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.radius += b.speed;
        if (b.radius > 400) bullets.splice(i, 1);
    }

    // Update Enemies
    if (frameCount % 60 === 0) spawnEnemy(); // Spawn rate

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.radius -= e.speed;
        e.angle += e.spiral;

        // Collision: Enemy hits Player
        const distToPlayer = Math.hypot(
            Math.cos(player.angle)*player.radius - Math.cos(e.angle)*e.radius,
            Math.sin(player.angle)*player.radius - Math.sin(e.angle)*e.radius
        );
        
        if (distToPlayer < player.size + e.size) {
            gameOver();
        }

        // Collision: Bullet hits Enemy
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            // Simple collision check based on radius and angle proximity
            let angleDiff = Math.abs(b.angle - e.angle);
            // Normalize angle difference
            if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;

            if (Math.abs(b.radius - e.radius) < 20 && angleDiff < 0.2) {
                // Hit!
                createExplosion(
                    canvas.width/2 + Math.cos(e.angle)*e.radius,
                    canvas.height/2 + Math.sin(e.angle)*e.radius,
                    e.color
                );
                playSound('explosion');
                score += e.score;
                scoreEl.innerText = score;
                enemies.splice(i, 1);
                bullets.splice(j, 1);
                break; // Bullet used up
            }
        }

        // Enemy reached center
        if (e.radius < 20) {
            enemies.splice(i, 1);
            playSound('hit');
            // Penalty or just disappear? Let's just disappear for now
        }
    }

    // Update Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.05;
        if(p.life <= 0) particles.splice(i, 1);
    }

    // Update Stars (Background)
    stars.forEach(s => {
        s.radius += s.speed;
        if(s.radius > 400) {
            s.radius = 0;
            s.angle = Math.random() * Math.PI * 2;
        }
    });

    frameCount++;
}

function draw() {
    // Clear Screen with trail effect
    ctx.fillStyle = 'rgba(5, 5, 10, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // Draw Stars
    ctx.fillStyle = '#ffffff';
    stars.forEach(s => {
        let x = cx + Math.cos(s.angle) * s.radius;
        let y = cy + Math.sin(s.angle) * s.radius;
        ctx.globalAlpha = Math.max(0, 1 - s.radius/400);
        ctx.beginPath();
        ctx.arc(x, y, s.size, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;

    // Draw Tube Rings (Retro effect)
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    for(let r=50; r<400; r+=50) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.stroke();
    }

    // Helper to convert polar to cartesian
    const getPos = (angle, radius) => ({
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius
    });

    // Draw Bullets
    ctx.fillStyle = '#ffaa00';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ffaa00';
    bullets.forEach(b => {
        let pos = getPos(b.angle, b.radius);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 4, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    // Draw Enemies
    enemies.forEach(e => {
        let pos = getPos(e.angle, e.radius);
        ctx.fillStyle = e.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = e.color;
        
        ctx.beginPath();
        // Draw enemy shape (diamond-ish)
        ctx.moveTo(pos.x, pos.y - e.size);
        ctx.lineTo(pos.x + e.size, pos.y);
        ctx.lineTo(pos.x, pos.y + e.size);
        ctx.lineTo(pos.x - e.size, pos.y);
        ctx.closePath();
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    // Draw Player
    if (gameRunning) {
        let pPos = getPos(player.angle, player.radius);
        
        ctx.save();
        ctx.translate(pPos.x, pPos.y);
        ctx.rotate(player.angle + Math.PI/2); // Rotate to face outward
        
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        
        ctx.beginPath();
        ctx.moveTo(0, -player.size);
        ctx.lineTo(player.size/2, player.size);
        ctx.lineTo(-player.size/2, player.size);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
        ctx.shadowBlur = 0;
    }

    // Draw Particles
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1.0;
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function startGame() {
    score = 0;
    scoreEl.innerText = score;
    enemies = [];
    bullets = [];
    particles = [];
    player.radius = 200;
    player.angle = -Math.PI/2;
    gameRunning = true;
    
    startScreen.classList.remove('active');
    gameOverScreen.classList.remove('active');
    
    // Resume audio context if needed
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function gameOver() {
    gameRunning = false;
    playSound('hit');
    finalScoreEl.innerText = score;
    
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('gyruss_highscore', highScore);
        highScoreEl.innerText = highScore;
    }
    
    hasSavedScore = false;
    openGameOverPanel();
}

// UI Event Listeners
startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);
saveScoreButton.addEventListener('click', handleSaveScore);
modalRestartBtn.addEventListener('click', () => {
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden', 'true');
    startGame();
});
returnGamesButton.addEventListener('click', () => {
    window.location.href = '/play';
});
playerNameInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') handleSaveScore();
});

// Start Loop
loop();

</script>
</body>
</html>
